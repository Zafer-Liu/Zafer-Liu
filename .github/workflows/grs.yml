name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"  # 每天更新一次
  workflow_dispatch:      # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 生成 GitHub 统计卡片
      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=default
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 生成常用语言卡片
      - name: Generate langs card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=default
          path: profile/langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 提交生成的卡片到仓库
      - name: Commit cards
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update README cards"
          file_pattern: profile/*.svg
          commit_user_name: "github-actions"
          commit_user_email: "github-actions@users.noreply.github.com"
